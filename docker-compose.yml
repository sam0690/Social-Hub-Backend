version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: socialhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: socialhub_dev
    ports:
      - '5433:5432'
    volumes:
      - socialhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialhub_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - socialhub_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  socialhub_postgres_data:
  socialhub_redis_data: